<!doctype html>
<html lang="id" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LENTERA42 Premium Platform</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Import Map untuk ESM (Native React & Lucide Icons) -->
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.2.0?dev",
      "react-dom/client": "https://esm.sh/react-dom@18.2.0/client?dev",
      "lucide-react": "https://esm.sh/lucide-react@0.292.0"
    }
  }
  </script>
  
  <!-- Babel Standalone untuk kompilasi JSX on-the-fly -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">

  <style>
    body { 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      touch-action: manipulation; 
    }
    .font-serif { 
      font-family: 'Playfair Display', serif; 
    }
    /* Scrollbar Styling */
    ::-webkit-scrollbar { 
      width: 6px; 
    }
    ::-webkit-scrollbar-track { 
      background: transparent; 
    }
    ::-webkit-scrollbar-thumb { 
      background: #cbd5e1; 
      border-radius: 10px; 
    }
    ::-webkit-scrollbar-thumb:hover { 
      background: #94a3b8; 
    }
  </style>
</head>
<body class="h-full bg-[#FCFBFA]">
  <div id="root" class="min-h-full"></div>

  <!-- Script utama bertipe module untuk mendukung import map -->
  <script type="text/babel" data-type="module">
    import React, { useState, useEffect } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
      Trophy, 
      LayoutDashboard, 
      Settings, 
      BookOpen, 
      ChevronRight,
      ExternalLink,
      FileText,
      Youtube,
      Crown,
      ChevronLeft,
      MessageSquare,
      Layers,
      Plus,
      Trash2,
      Edit,
      Save,
      X,
      Star,
      Users,
      MapPin,
      School,
      ChevronDown,
      Quote,
      Maximize2,
      Minimize2,
      Info,
      Clock,
      BookOpenCheck,
      Compass,
      Laptop,
      Search,
      Lock,
      Loader2
    } from 'lucide-react';

    // ==========================================
    // URL GOOGLE APPS SCRIPT ANDA
    // ==========================================
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxZ6O7cyW-jyTg9-fkxEmLTct5QboMVFRmhaG0Ue8Qgv4Ro9asn0O26J06qUjGaqDHO/exec"; 

    const App = () => {
      // --- State Navigasi & UI ---
      const [view, setView] = useState('home'); 
      const [selectedSubject, setSelectedSubject] = useState(null);
      const [isAdmin, setIsAdmin] = useState(false);
      const [adminTab, setAdminTab] = useState('materi');
      
      // --- Fullscreen State ---
      const [isFullscreen, setIsFullscreen] = useState(false);
      const [showFsError, setShowFsError] = useState(false);

      // --- Pagination State (Konten/Materi dalam Mapel) ---
      const [contentCurrentPage, setContentCurrentPage] = useState(1);
      const [contentItemsPerPage, setContentItemsPerPage] = useState(6);

      // --- State Fitur Search di Dashboard ---
      const [searchQuery, setSearchQuery] = useState('');
      const [showSearchResults, setShowSearchResults] = useState(false);

      // --- State Fitur Search di Mode Admin (Kelola Materi) ---
      const [adminContentSearch, setAdminContentSearch] = useState('');

      // --- State Verifikasi Sandi Admin ---
      const [showAdminLoginModal, setShowAdminLoginModal] = useState(false);
      const [adminPasswordInput, setAdminPasswordInput] = useState('');
      const [loginError, setLoginError] = useState('');

      // --- Loading State ---
      const [isLoading, setIsLoading] = useState(true);

      // --- Data Utama (Mata Pelajaran) ---
      const [subjects, setSubjects] = useState([
        { id: '1', name: 'Pendidikan Agama dan Budi Pekerti', icon: '🕌', color: 'bg-blue-50 text-blue-600' },
        { id: '2', name: 'Pendidikan Pancasila', icon: '🦅', color: 'bg-red-50 text-red-600' },
        { id: '3', name: 'Bahasa Indonesia', icon: '📖', color: 'bg-sky-50 text-sky-600' },
        { id: '4', name: 'Matematika', icon: '🔢', color: 'bg-emerald-50 text-emerald-600' },
        { id: '5', name: 'IPAS (Ilmu Pengetahuan Alam dan Sosial)', icon: '🔬', color: 'bg-purple-50 text-purple-600' },
        { id: '6', name: 'Bahasa Inggris', icon: '🌎', color: 'bg-indigo-50 text-indigo-600' },
        { id: '7', name: 'PJOK (Pendidikan Jasmani, Olahraga, dan Kesehatan)', icon: '⚽', color: 'bg-orange-50 text-orange-600' },
        { id: '8', name: 'Seni dan Budaya', icon: '🎨', color: 'bg-pink-50 text-pink-600' },
        { id: '11', name: 'Informatika', icon: '💻', color: 'bg-blue-100 text-blue-800' },
        { id: '12', name: 'Pendidikan Anti Korupsi (PAK)', icon: '⚖️', color: 'bg-red-100 text-red-800' },
        { id: '9', name: 'Muatan Lokal', icon: '🏠', color: 'bg-stone-50 text-stone-600' },
        { id: '10', name: 'Lainnya', icon: '✨', color: 'bg-slate-50 text-slate-600' },
      ]);

      const [contents, setContents] = useState([]);
      const [contributors, setContributors] = useState([]);
      const [testimonials, setTestimonials] = useState([]);

      // --- Mengambil Data dari Backend Saat Aplikasi Dimuat ---
      useEffect(() => {
        const fetchInitialData = async () => {
          try {
            if(GAS_URL.includes("YOUR-ID-HERE")) {
              console.warn("URL GAS Belum diset. Menggunakan data kosong sementara.");
              setIsLoading(false);
              return;
            }

            const response = await fetch(GAS_URL, {
              method: "POST",
              body: JSON.stringify({ action: "readAll" })
            });
            const result = await response.json();
            
            if (result.success) {
              setContents(result.data.contents || []);
              setContributors(result.data.contributors || []);
              setTestimonials(result.data.testimonials || []);
            }
          } catch (error) {
            console.error("Gagal mengambil data dari Database:", error);
          } finally {
            setIsLoading(false);
          }
        };

        fetchInitialData();
      }, []);

      // --- Helper API Call (Background Sync) ---
      const syncDatabase = async (action, table, data) => {
        if(GAS_URL.includes("YOUR-ID-HERE")) return;
        try {
          await fetch(GAS_URL, {
            method: "POST",
            body: JSON.stringify({ action, table, data })
          });
        } catch (error) {
          console.error("Sinkronisasi gagal:", error);
        }
      };

      // --- Form States (Untuk Admin) ---
      const [formContent, setFormContent] = useState({ id: null, title: '', subjectId: '', type: 'Media Ajar', url: '', grade: 'Kelas 1', rating: 5, contributorId: '', desc: '' });
      const [formContributor, setFormContributor] = useState({ id: null, name: '', school: '', province: '', role: '' });
      const [formTestimoni, setFormTestimoni] = useState({ id: null, name: '', role: '', instansi: '', text: '', rating: 5 });

      // --- State Modal & Slider Public Testimoni ---
      const [showPublicTestimoniModal, setShowPublicTestimoniModal] = useState(false);
      const [publicTestimoni, setPublicTestimoni] = useState({ name: '', role: '', instansi: '', text: '', rating: 5 });
      const [currentTesti, setCurrentTesti] = useState(0);

      // --- Handlers: Slider Testimoni ---
      const nextTesti = () => {
        if (testimonials.length === 0) return;
        setCurrentTesti((prev) => (prev + 1) % testimonials.length);
      };
      
      const prevTesti = () => {
        if (testimonials.length === 0) return;
        setCurrentTesti((prev) => (prev - 1 + testimonials.length) % testimonials.length);
      };

      // --- Handlers: Fullscreen ---
      const toggleFullscreen = () => {
        try {
          if (!document.fullscreenElement) {
            const requestMethod = document.documentElement.requestFullscreen || 
                                document.documentElement.webkitRequestFullscreen || 
                                document.documentElement.mozRequestFullScreen || 
                                document.documentElement.msRequestFullscreen;

            if (requestMethod) {
              requestMethod.call(document.documentElement)
                .then(() => setIsFullscreen(true))
                .catch(err => {
                  console.warn("Fullscreen blocked:", err);
                  setShowFsError(true);
                  setTimeout(() => setShowFsError(false), 3000);
                });
            } else {
              setShowFsError(true);
              setTimeout(() => setShowFsError(false), 3000);
            }
          } else {
            if (document.exitFullscreen) document.exitFullscreen();
            setIsFullscreen(false);
          }
        } catch (e) {
          setShowFsError(true);
          setTimeout(() => setShowFsError(false), 3000);
        }
      };

      useEffect(() => {
        const handleFsChange = () => setIsFullscreen(!!(document.fullscreenElement || document.webkitFullscreenElement));
        document.addEventListener('fullscreenchange', handleFsChange);
        return () => document.removeEventListener('fullscreenchange', handleFsChange);
      }, []);

      // --- Handlers: CRUD Materi ---
      const handleSaveContent = () => {
        if (!formContent.title || !formContent.subjectId || !formContent.url) {
          alert('Mohon lengkapi Judul, Mata Pelajaran, dan URL!');
          return;
        }

        const isNew = !formContent.id;
        const payload = { ...formContent, id: isNew ? 'c' + Date.now() : formContent.id };

        if (isNew) {
          setContents([payload, ...contents]);
        } else {
          setContents(contents.map(c => c.id === payload.id ? payload : c));
        }

        syncDatabase(isNew ? 'create' : 'update', 'contents', payload);
        resetFormContent();
      };
      
      const handleEditContent = (c) => setFormContent(c);
      
      const handleDeleteContent = (id) => {
        if(window.confirm("Yakin ingin menghapus materi ini?")) {
          setContents(contents.filter(c => c.id !== id));
          syncDatabase('delete', 'contents', { id });
        }
      };
      
      const resetFormContent = () => setFormContent({ id: null, title: '', subjectId: '', type: 'Media Ajar', url: '', grade: 'Kelas 1', rating: 5, contributorId: '', desc: '' });

      // --- Handlers: CRUD Kontributor ---
      const handleSaveContributor = () => {
        if (!formContributor.name || !formContributor.role) {
          alert('Mohon lengkapi Nama dan Jabatan!');
          return;
        }
        
        const isNew = !formContributor.id;
        const payload = { ...formContributor, id: isNew ? 'u' + Date.now() : formContributor.id };

        if (isNew) {
          setContributors([...contributors, payload]);
        } else {
          setContributors(contributors.map(c => c.id === payload.id ? payload : c));
        }

        syncDatabase(isNew ? 'create' : 'update', 'contributors', payload);
        resetFormContributor();
      };

      const handleEditContributor = (c) => setFormContributor(c);

      const handleDeleteContributor = (id) => {
        if(window.confirm("Yakin ingin menghapus kontributor ini?")) {
          setContributors(contributors.filter(c => c.id !== id));
          syncDatabase('delete', 'contributors', { id });
        }
      };
      const resetFormContributor = () => setFormContributor({ id: null, name: '', school: '', province: '', role: '' });

      // --- Handlers: CRUD Testimoni (Admin) ---
      const handleSaveTestimoni = () => {
        if (!formTestimoni.name || !formTestimoni.text) {
          alert('Mohon lengkapi Nama dan Isi Pesan!');
          return;
        }

        const isNew = !formTestimoni.id;
        const payload = { ...formTestimoni, id: 't' + Date.now() };

        if (isNew) {
          setTestimonials([payload, ...testimonials]);
        } else {
          setTestimonials(testimonials.map(t => t.id === payload.id ? payload : t));
        }

        syncDatabase(isNew ? 'create' : 'update', 'testimonials', payload);
        resetFormTestimoni();
      };
      
      const handleEditTestimoni = (t) => setFormTestimoni(t);
      
      const handleDeleteTestimoni = (id) => {
        if(window.confirm("Yakin ingin menghapus testimoni ini?")) {
          setTestimonials(testimonials.filter(t => t.id !== id));
          syncDatabase('delete', 'testimonials', { id });
          setCurrentTesti(0); 
        }
      };
      const resetFormTestimoni = () => setFormTestimoni({ id: null, name: '', role: '', instansi: '', text: '', rating: 5 });

      // --- Handlers: Public Testimoni ---
      const handlePublicSubmitTestimoni = (e) => {
        e.preventDefault();
        if (!publicTestimoni.name || !publicTestimoni.text) {
          alert('Mohon lengkapi Nama dan Pesan Testimoni!');
          return;
        }

        const payload = { ...publicTestimoni, id: 't' + Date.now() };
        setTestimonials([payload, ...testimonials]);
        syncDatabase('create', 'testimonials', payload);
        
        setShowPublicTestimoniModal(false);
        setPublicTestimoni({ name: '', role: '', instansi: '', text: '', rating: 5 });
        setCurrentTesti(0); 
      };

      // --- Routing Logic ---
      useEffect(() => {
        const handleHashChange = () => {
          const hash = window.location.hash;
          if (hash === '#/admin') {
            if (isAdmin) {
              setView('admin-panel');
            } else {
              setShowAdminLoginModal(true);
            }
          } else if (hash === '#/subjects') {
            setView('subjects');
          } else if (hash === '#/leaderboard') {
            setView('leaderboard');
          } else if (hash === '#/testimoni') {
            setView('testimoni');
          } else {
            setView('home');
          }
        };

        window.addEventListener('hashchange', handleHashChange);
        handleHashChange(); 

        return () => window.removeEventListener('hashchange', handleHashChange);
      }, [isAdmin]);

      const navigateTo = (newView, hash = '') => {
        if (hash) window.location.hash = hash;
        else {
          window.location.hash = '';
          setView(newView);
        }
      };

      // --- Admin Password Verification Submit ---
      const handleAdminLoginSubmit = (e) => {
        e.preventDefault();
        if (adminPasswordInput === 'rahasia') {
          setIsAdmin(true);
          setView('admin-panel');
          window.location.hash = '#/admin';
          setShowAdminLoginModal(false);
          setAdminPasswordInput('');
          setLoginError('');
        } else {
          setLoginError('Password salah! Silakan coba lagi.');
        }
      };

      const toggleAdmin = () => {
        if (!isAdmin) {
          setShowAdminLoginModal(true);
        } else {
          window.location.hash = '';
          setIsAdmin(false);
          setView('home');
        }
      };

      // --- Logic Helpers ---
      const getContentCount = (subjectId) => contents.filter(c => String(c.subjectId) === String(subjectId)).length;

      // --- Pagination Logic (Materi dalam Detail Mapel) ---
      const getFilteredContents = () => {
        if (!selectedSubject) return [];
        return contents.filter(c => String(c.subjectId) === String(selectedSubject.id));
      };
      const filteredContents = getFilteredContents();
      const indexOfLastContent = contentCurrentPage * contentItemsPerPage;
      const indexOfFirstContent = indexOfLastContent - contentItemsPerPage;
      const currentContents = filteredContents.slice(indexOfFirstContent, indexOfLastContent);
      const totalContentPages = Math.ceil(filteredContents.length / contentItemsPerPage);

      // Reset pagination konten saat berpindah mata pelajaran
      useEffect(() => {
        setContentCurrentPage(1);
      }, [selectedSubject]);

      // Hitung poin kontributor secara dinamis berdasarkan rating konten
      const contributorsWithPoints = contributors.map(contributor => {
        const totalPoints = contents
          .filter(c => String(c.contributorId) === String(contributor.id))
          .reduce((sum, content) => {
            const r = Number(content.rating) || 0;
            if (r === 5) return sum + 10;
            if (r === 4) return sum + 8;
            if (r === 3) return sum + 5;
            if (r === 2) return sum + 4;
            if (r === 1) return sum + 3;
            return sum;
          }, 0);
        return { ...contributor, points: totalPoints };
      });

      const sortedContributors = [...contributorsWithPoints].sort((a, b) => b.points - a.points);
      const podium = sortedContributors.slice(0, 3);
      const otherContributors = sortedContributors.slice(3);

      // --- Pencarian Multi-Kriteria Dashboard ---
      const searchedContents = searchQuery.trim() === '' ? [] : contents.filter(content => {
        const queryLower = searchQuery.toLowerCase();
        
        // Cari berdasarkan judul materi
        const titleMatch = content.title.toLowerCase().includes(queryLower);
        
        // Cari berdasarkan kelas
        const gradeMatch = content.grade.toLowerCase().includes(queryLower);
        
        // Cari berdasarkan jenis tipe materi
        const typeMatch = content.type.toLowerCase().includes(queryLower);
        
        // Cari berdasarkan mata pelajaran
        const mapelObj = subjects.find(s => String(s.id) === String(content.subjectId));
        const mapelMatch = mapelObj ? mapelObj.name.toLowerCase().includes(queryLower) : false;
        
        // Cari berdasarkan nama kontributor
        const contrObj = contributors.find(u => String(u.id) === String(content.contributorId));
        const contrMatch = contrObj ? contrObj.name.toLowerCase().includes(queryLower) : false;

        return titleMatch || gradeMatch || typeMatch || mapelMatch || contrMatch;
      });

      // --- Pencarian Daftar Konten di Mode Admin ---
      const filteredAdminContents = contents.filter(c => {
        if (adminContentSearch.trim() === '') return true;
        const queryLower = adminContentSearch.toLowerCase();
        
        const titleMatch = c.title.toLowerCase().includes(queryLower);
        const gradeMatch = c.grade.toLowerCase().includes(queryLower);
        const typeMatch = c.type.toLowerCase().includes(queryLower);
        
        const mapelObj = subjects.find(s => String(s.id) === String(c.subjectId));
        const mapelMatch = mapelObj ? mapelObj.name.toLowerCase().includes(queryLower) : false;
        
        const contrObj = contributors.find(u => String(u.id) === String(c.contributorId));
        const contrMatch = contrObj ? contrObj.name.toLowerCase().includes(queryLower) : false;

        return titleMatch || gradeMatch || typeMatch || mapelMatch || contrMatch;
      });

      // Helper untuk menentukan warna jenis konten (menggunakan warna biru / teal / sky)
      const getMediaTypeStyle = (type) => {
        switch (type) {
          case 'Video Pembelajaran':
            return 'bg-blue-50 text-blue-600 border-blue-100';
          case 'Media Ajar':
            return 'bg-sky-50 text-sky-600 border-sky-100';
          case 'Augmented Reality':
            return 'bg-indigo-50 text-indigo-600 border-indigo-100';
          case 'Infografis':
            return 'bg-teal-50 text-teal-600 border-teal-100';
          case 'Bahan Ajar':
          default:
            return 'bg-slate-50 text-slate-600 border-slate-100';
        }
      };

      // Helper untuk menentukan ikon jenis konten
      const getMediaTypeIcon = (type) => {
        switch (type) {
          case 'Video Pembelajaran':
            return <Youtube size={16} />;
          case 'Media Ajar':
            return <Laptop size={16} />;
          case 'Augmented Reality':
            return <Maximize2 size={16} />;
          case 'Infografis':
            return <FileText size={16} />;
          case 'Bahan Ajar':
          default:
            return <BookOpen size={16} />;
        }
      };

      // Tampilkan layer Loading saat pertama kali buka web
      if (isLoading) {
        return (
          <div className="min-h-screen bg-[#FCFBFA] flex flex-col items-center justify-center">
            <div className="w-16 h-16 bg-gradient-to-tr from-blue-500 to-indigo-600 rounded-2xl flex items-center justify-center text-white shadow-xl mb-6 animate-pulse">
              <Crown size={28} />
            </div>
            <Loader2 className="animate-spin text-blue-500 mb-4" size={24} />
            <p className="text-slate-500 font-bold uppercase tracking-widest text-[10px]">Menyinkronkan Database LENTERA42...</p>
          </div>
        );
      }

      return (
        <div className="flex flex-col min-h-screen bg-[#FCFBFA] text-slate-800 text-sm leading-relaxed overflow-x-hidden">
          {/* Sidebar */}
          <nav className="w-full md:w-64 bg-[#0F172A] p-6 flex flex-col shrink-0 z-20 text-white shadow-2xl md:fixed md:inset-y-0 md:left-0 overflow-y-auto">
            <div className="flex items-center gap-2 mb-10 cursor-pointer group" onClick={() => navigateTo('home')}>
              <div className="w-9 h-9 bg-gradient-to-tr from-blue-500 to-indigo-600 rounded-xl flex items-center justify-center text-white shadow-xl">
                <Crown size={18} />
              </div>
              <div>
                <span className="text-base font-extrabold text-blue-400 block tracking-tight leading-none">LENTERA42</span>
                <span className="text-[8px] font-bold text-slate-500 tracking-[0.05em] uppercase block mt-0.5">SMPN 42 B. Lampung</span>
              </div>
            </div>

            <div className="space-y-1 flex-1">
              <NavItem icon={<LayoutDashboard size={14}/>} label="Dashboard" active={view === 'home'} onClick={() => navigateTo('home')} />
              <NavItem icon={<BookOpen size={14}/>} label="Mata Pelajaran" active={view === 'subjects' || view === 'subject-detail'} onClick={() => navigateTo('subjects', '#/subjects')} />
              <NavItem icon={<Trophy size={14}/>} label="Kontributor" active={view === 'leaderboard'} onClick={() => navigateTo('leaderboard', '#/leaderboard')} />
              <NavItem icon={<MessageSquare size={14}/>} label="Testimoni" active={view === 'testimoni'} onClick={() => navigateTo('testimoni', '#/testimoni')} />
            </div>

            <div className="mt-6 pt-6 border-t border-slate-800/50">
               <button 
                  onClick={toggleAdmin}
                  className={`w-full p-3 rounded-xl flex items-center gap-3 font-bold transition-all ${isAdmin ? 'bg-blue-600 text-white shadow-lg' : 'bg-slate-800/50 text-slate-400 hover:text-white'}`}
               >
                  <Settings size={14} />
                  <div className="text-left">
                    <p className="text-[7px] leading-none opacity-60 uppercase font-extrabold tracking-widest text-slate-400">Panel</p>
                    <p className="text-[11px] font-bold">{isAdmin ? 'Mode Admin' : 'Login User'}</p>
                  </div>
               </button>
            </div>
          </nav>

          {/* Main Content Area */}
          <main className="flex-1 p-6 md:p-8 lg:p-12 flex flex-col justify-between min-h-screen md:ml-64">
            
            <div className="space-y-8 flex-1">
              {/* VIEW: HOME */}
              {view === 'home' && (
                <div className="max-w-5xl mx-auto space-y-8 animate-in fade-in duration-500">
                  <header className="relative py-12 px-6 sm:py-16 sm:px-12 bg-slate-900 rounded-[2.5rem] text-white overflow-visible shadow-2xl border-b-4 border-blue-500/50">
                     {/* Flex container layout untuk teks di kiri dan gambar di kanan secara keseluruhan */}
                     <div className="relative z-30 flex flex-col lg:flex-row items-center justify-between gap-8">
                       <div className="space-y-6 lg:w-7/12 text-left flex flex-col justify-center">
                          <span className="inline-block bg-blue-500/10 text-blue-400 border border-blue-500/20 px-3 py-1 rounded-full text-[8px] font-extrabold uppercase tracking-[0.2em] w-max">Platform Digital</span>
                          <h1 className="text-5xl md:text-6xl lg:text-[3.75rem] font-serif leading-[1.1]"><span className="whitespace-nowrap">Transformasi Belajar</span> <br/><span className="text-blue-400 italic font-medium">Tanpa Batas.</span></h1>
                          <p className="text-slate-400 max-w-md text-sm font-normal leading-relaxed">Akses pembelajaran digital inovatif dengan materi pilihan dan kurikulum terbaru hanya di LENTERA42 (Layanan Interaktif Materi dan Pembelajaran SMPN 42 Bandar Lampung)</p>
                          
                          {/* --- FITUR: SEARCH BAR INDAH --- */}
                          <div className="relative max-w-xl z-45 w-full">
                            <div className="relative flex items-center bg-white/10 hover:bg-white/15 focus-within:bg-white text-slate-200 focus-within:text-slate-800 rounded-2xl border border-white/10 focus-within:border-blue-400 focus-within:ring-4 focus-within:ring-blue-400/20 shadow-lg transition-all">

                            <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Rating (Bintang)</label>
                            <div className="flex gap-2 p-1.5 bg-slate-50 border border-slate-100 rounded-xl w-fit">
                              {[1, 2, 3, 4, 5].map(num => (
                                <button key={num} type="button" onClick={() => setPublicTestimoni({...publicTestimoni, rating: num})} className={`w-10 h-8 rounded-lg text-xs font-bold transition-all ${publicTestimoni.rating === num ? 'bg-white shadow-sm text-blue-500' : 'text-slate-400 hover:text-slate-600'}`}>
                                  {num} <Star size={10} className="inline mb-0.5" fill={publicTestimoni.rating >= num ? "currentColor" : "none"} />
                                </button>
                              ))}
                            </div>
                          </div>
                          <div className="space-y-1.5">
                              <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Deskripsi Testimoni</label>
                              <textarea required rows="4" value={publicTestimoni.text} onChange={e => setPublicTestimoni({...publicTestimoni, text: e.target.value})} className="w-full p-3.5 bg-slate-50 border border-slate-100 rounded-xl focus:ring-2 focus:ring-blue-500/20 outline-none transition-all font-medium text-sm resize-none" placeholder="Tuliskan pengalaman belajar Anda di sini..."></textarea>
                          </div>
                          <div className="pt-2 shrink-0">
                            <button type="submit" className="w-full bg-slate-900 text-blue-400 py-4 rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-slate-800 transition-all shadow-xl">Kirim Testimoni</button>
                          </div>
                      </form>
                  </div>
              </div>
            )}

            {/* Modal Login Admin */}
            {showAdminLoginModal && (
              <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                  <div className="bg-white rounded-2xl shadow-2xl w-full max-sm overflow-hidden animate-in zoom-in-95 duration-200">
                      <div className="bg-slate-50 px-6 py-4 border-b border-slate-100 flex justify-between items-center">
                          <h3 className="font-extrabold text-lg text-gray-900 flex items-center gap-2">
                            <Lock size={18} className="text-red-600"/> Akses Admin
                          </h3>
                          <button onClick={() => { setShowAdminLoginModal(false); setAdminPasswordInput(''); setLoginError(''); window.location.hash = ''; }} className="text-slate-400 hover:text-red-500 transition"><X size={20} /></button>
                      </div>
                      <form onSubmit={handleAdminLoginSubmit} className="p-6 space-y-4">
                          <div>
                              <label className="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">Password</label>
                              <input 
                                  autoFocus
                                  type="password" 
                                  required 
                                  value={adminPasswordInput} 
                                  onChange={e => { setAdminPasswordInput(e.target.value); setLoginError(''); }} 
                                  className="w-full border border-slate-200 rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500 transition text-center text-lg tracking-widest bg-slate-50 focus:bg-white" 
                                  placeholder="•••••" 
                              />
                              {loginError && (
                                <p className="text-xs text-red-500 font-bold mt-2 text-center flex items-center justify-center gap-1">
                                  <Info size={12} /> {loginError}
                                </p>
                              )}
                          </div>
                          <button type="submit" className="w-full py-3.5 bg-slate-900 text-blue-400 font-extrabold rounded-xl shadow-md hover:shadow-lg transition-all active:scale-[0.98]">
                            Masuk Panel Admin
                          </button>
                      </form>
                  </div>
              </div>
            )}

          </main>
        </div>
      );
    };

    const NavItem = ({ icon, label, active, onClick }) => (
      <button onClick={onClick} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl font-extrabold transition-all group ${active ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-500 hover:text-white hover:bg-white/5'}`}>
        <span className={`${active ? 'text-white' : 'group-hover:text-blue-400'}`}>{icon}</span>
        <span className="text-[9px] uppercase tracking-[0.15em] font-bold">{label}</span>
      </button>
    );

    const AdminTab = ({ active, icon, label, onClick }) => (
      <button onClick={onClick} className={`w-full text-left p-4 rounded-2xl font-bold text-xs flex items-center justify-between transition-all ${active ? 'bg-blue-50 text-blue-600 shadow-sm' : 'text-slate-400 hover:bg-slate-50'}`}>
        <span className="flex items-center gap-3">{icon} {label}</span>
        {active ? <ChevronRight size={14} /> : null}
      </button>
    );

    const InputGroup = ({ label, placeholder, type = "text", value, onChange }) => (
      <div className="space-y-1.5">
        <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">{label}</label>
        <input type={type} value={value} onChange={e => onChange(e.target.value)} className="w-full p-3.5 bg-slate-50 border border-slate-100 rounded-xl focus:ring-2 focus:ring-blue-500/20 outline-none transition-all font-medium text-sm" placeholder={placeholder} />
      </div>
    );

    const container = document.getElementById('root');
    const root = createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
